# Splunk Detection Rules — SIEM Homelab

 
# ============================================================
# RULE 1 — SSH Brute Force Detection (Linux)
# Triggers when failed SSH login attempts exceed 5 from any host
# MITRE ATT&CK: T1110.001 — Brute Force: Password Guessing
# ============================================================
[SSH Brute Force Detected]
search = index=main sourcetype=linux_secure "Failed password" | stats count by host | where count > 5
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 3
alert.track = 1
description = Detects SSH brute force attacks by counting failed password attempts. Triggers when count exceeds 5 from a single host within 5 minutes.
 
# ============================================================
# RULE 2 — Failed Windows Login Detection (Event ID 4625)
# Triggers when failed Windows logon attempts exceed 3
# MITRE ATT&CK: T1110.001 — Brute Force: Password Guessing
# ============================================================
[Brute Force - Failed Windows Logins]
search = index=main sourcetype=WinEventLog EventCode=4625 | stats count by Account_Name, host | where count > 3
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 3
alert.track = 1
description = Detects repeated failed Windows login attempts. Triggers when a single account exceeds 3 failed logons within 5 minutes. Maps to credential access techniques.
 
# ============================================================
# RULE 3 — New User Account Creation (Event ID 4720)
# Triggers on any new Windows user account creation
# MITRE ATT&CK: T1136 — Create Account
# ============================================================
[New User Account Created]
search = index=main sourcetype=WinEventLog EventCode=4720
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 2
alert.track = 1
description = Detects creation of new Windows user accounts (Event ID 4720). Any new account creation in a monitored environment should be investigated to confirm it is authorized.
